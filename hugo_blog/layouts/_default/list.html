{{ define "main" }}
<h1 class="page-title">{{ .Title }}</h1>
<div class="posts-list">
  {{ range .Pages }}
    <div class="post-card liquid-glass-card" style="align-items: flex-start; text-align: left;">
      <h2 class="post-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>

      <div class="post-date">{{ .Date.Format "January 02, 2006" }}</div>
      <div class="post-summary">{{ .Summary | plainify | truncate 150 }}...</div>
    </div>
  {{ end }}
</div>
{{ end }}
