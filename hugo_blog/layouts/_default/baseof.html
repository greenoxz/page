<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "th" }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  
  <!-- Use absolute paths starting from root for consistency -->
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/theme.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  
  <style>
    .blog-content { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; text-align: left; }
  </style>

  <script>
    function toggleMenu() {
      const menu = document.getElementById("mobile-menu");
      const isMenuVisible = !menu.classList.contains("hidden");
      const iconPath = document.querySelector("#hamburger-btn svg path");
      if (isMenuVisible) {
        menu.classList.remove("animate-in"); menu.classList.add("animate-out");
        iconPath.setAttribute("d", "M4 6h16M4 12h16M4 18h16");
        setTimeout(() => menu.classList.add("hidden"), 180);
      } else {
        menu.classList.remove("hidden"); menu.classList.remove("animate-out");
        void menu.offsetWidth; menu.classList.add("animate-in");
        iconPath.setAttribute("d", "M6 18L18 6M6 6l12 12");
      }
    }
  </script>
</head>
<body class="theme-light" id="theme-body">
  <div class="page-container">
    <div id="navbar-include">
      {{ partial "nav.html" . }}
    </div>
    
    <main class="main-section">
      <div class="content blog-content">
        {{ block "main" . }}{{ end }}
      </div>
    </main>

    <div id="footer-include">
      {{ partial "footer.html" . }}
    </div>
  </div>
  
  <script src="/js/main.js"></script>
</body>
</html>
