<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "th" }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  
  <!-- Use absolute paths starting from root for consistency -->
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/theme.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  
  <style>
    .blog-content { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; text-align: left; }
  </style>


</head>
<body class="theme-light" id="theme-body">
  <div class="page-container">
    <div id="navbar-include">
      {{ partial "nav.html" . }}
    </div>
    
    <main class="main-section">
      <div class="content blog-content">
        {{ block "main" . }}{{ end }}
      </div>
    </main>

    <div id="footer-include">
      {{ partial "footer.html" . }}
    </div>
  </div>
  
  <script src="/js/main.js"></script>
</body>
</html>
