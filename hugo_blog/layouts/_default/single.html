{{ define "main" }}
<article class="post-single liquid-glass-card" style="align-items: flex-start; text-align: left; padding: clamp(30px, 5vw, 60px); max-width: 900px; margin: 0 auto; min-height: 80vh;">
  <div class="post-back" style="margin-bottom: 2rem;">
    <a href="/blog/" style="color: #f97316; font-weight: 600; font-family: 'LINESeedSansTH', sans-serif;">
      <i class="fas fa-arrow-left"></i> กลับไปรายการบล็อก
    </a>
  </div>
  
  <header style="width: 100%; margin-bottom: 2.5rem;">
    <h1 class="post-title" style="font-size: clamp(2rem, 4vw, 3.5rem); margin: 0.5rem 0; line-height: 1.2; background: linear-gradient(135deg, #f97316, #ea580c); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
      {{ .Title }}
    </h1>

    <div style="display: flex; gap: 20px; align-items: center; opacity: 0.6; font-size: 0.95rem; margin-top: 1rem; font-family: 'LINESeedSansTH', sans-serif;">
       <span><i class="far fa-calendar-alt"></i> {{ .Date.Format "02 January 2006" }}</span>
       <span><i class="far fa-clock"></i> {{ .ReadingTime }} min read</span>
    </div>
  </header>

  <div class="post-content" style="line-height: 1.9; font-size: 1.15rem; width: 100%; color: inherit;">
    {{ .Content }}
  </div>

  <footer style="margin-top: 4rem; width: 100%; padding-top: 2rem; border-top: 1px solid rgba(0,0,0,0.1);">
     <div class="theme-dark-footer-fix" style="opacity: 0.7; font-size: 0.9rem; text-align: center;">
        ขอบคุณที่อ่านจนจบครับ! ติดตามเรื่องอื่นๆ ได้ในหมวดบล็อกครับ
     </div>
  </footer>
</article>

<style>
  /* Blog post content styling refined */
  .post-content h2 { font-size: 2rem; margin-top: 2.5rem; margin-bottom: 1rem; border-left: 5px solid #f97316; padding-left: 15px; }
  .post-content h3 { font-size: 1.5rem; margin-top: 2rem; margin-bottom: 0.8rem; }
  .post-content p { margin-bottom: 1.5rem; opacity: 0.9; }
  .post-content img { display: block; max-width: 100%; height: auto; margin: 2.5rem auto; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
  .post-content blockquote { border-left: 4px solid #f97316; padding: 10px 20px; font-style: italic; background: rgba(0,0,0,0.03); border-radius: 0 10px 10px 0; margin: 2rem 0; }
</style>
{{ end }}
