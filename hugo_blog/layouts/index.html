{{ define "main" }}
<div style="text-align: center; margin-bottom: clamp(3rem, 10vw, 5rem); padding: 0 1rem;">
  <h1 class="main-title tiny5-regular" style="font-size: clamp(3rem, 8vw, 5rem); margin-bottom: 0.5rem; background: linear-gradient(135deg, #f97316, #ea580c); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
    ppknr blog
  </h1>
  <p class="subtitle" style="font-size: clamp(1rem, 2vw, 1.4rem); opacity: 0.7; font-family: 'LINESeedSansTH', sans-serif;">
     รวบรวมบทความ เทคโนโลนี และความบันเทิงที่น่าสนใจ
  </p>
</div>

<div class="posts-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(clamp(280px, 100%, 350px), 1fr)); gap: 20px; padding: 0 1rem;">
  {{ range where .Site.RegularPages "Type" "posts" }}
    <a href="{{ .RelPermalink }}" style="display: block; height: 100%;">
      <div class="liquid-glass-card glass-green" style="align-items: flex-start; text-align: left; padding: 25px; transition: all 0.4s ease; height: 100%; display: flex; flex-direction: column;">
        <div class="post-meta" style="font-size: 0.8rem; margin-bottom: 0.8rem; opacity: 0.6; font-family: 'LINESeedSansTH', sans-serif; display: flex; gap: 10px;">
           <span><i class="far fa-calendar-alt"></i> {{ .Date.Format "02 Jan 2006" }}</span>
        </div>
        <h2 class="post-title" style="margin: 0 0 15px 0; font-size: 1.5rem; color: inherit; line-height: 1.3;">{{ .Title }}</h2>
        <p class="post-summary" style="font-size: 0.95rem; opacity: 0.8; margin-top: auto; line-height: 1.6;">{{ .Summary | plainify | truncate 120 }}</p>
        <div style="margin-top: 15px; font-weight: 600; color: #f97316; font-size: 0.9rem;">
           อ่านต่อ <i class="fas fa-arrow-right" style="font-size: 0.7rem; transition: transform 0.3s;"></i>
        </div>
      </div>
    </a>
  {{ end }}
</div>

<style>
  .liquid-glass-card:hover .fa-arrow-right { transform: translateX(5px); }
</style>
{{ end }}
