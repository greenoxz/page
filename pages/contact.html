  <style>
    .contact-wrapper {
      max-width: 480px;
      margin: 2rem auto;
      padding: 3rem 2rem;
      text-align: center;
      width: 100%;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(40px) saturate(150%);
      -webkit-backdrop-filter: blur(40px) saturate(150%);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 36px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
    }

    .theme-dark .contact-wrapper {
      background: rgba(30, 30, 32, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 1.2rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      border: 4px solid #ffffff;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    .profile-img:hover {
      transform: scale(1.08) rotate(-3deg);
    }

    .theme-dark .profile-img {
      border-color: #1a1a1a;
      box-shadow: 0 10px 25px rgba(255, 77, 28, 0.15);
    }

    .profile-name {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 0 0 0.2rem;
      letter-spacing: -0.02em;
    }

    .profile-bio {
      font-size: 1.05rem;
      opacity: 0.7;
      margin-bottom: 2rem;
      font-weight: 300;
    }

    .linktree-links {
      display: flex;
      flex-direction: column;
    }

    .link-box {
      display: flex;
      align-items: center;
      width: 85%;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(24px) saturate(200%);
      -webkit-backdrop-filter: blur(24px) saturate(200%);
      border-radius: 999px; /* ทรงแคปซูล */
      color: #1f2937;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.6);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s, background 0.4s, border-color 0.4s;
      position: relative;
      overflow: hidden;
    }

    .link-box:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.1);
      background: rgba(255, 255, 255, 0.65);
      border-color: rgba(255, 255, 255, 0.8);
    }

    .theme-dark .link-box {
      background: rgba(30, 30, 32, 0.4);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .theme-dark .link-box:hover {
      background: rgba(30, 30, 32, 0.6);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .link-icon {
      font-size: 1.6rem;
      width: 32px;
      display: flex;
      justify-content: center;
      transition: transform 0.3s;
    }

    .link-box:hover .link-icon {
      transform: scale(1.15);
    }

    .link-text {
      flex: 1;
      text-align: center;
      padding-right: 32px; /* ชดเชยความกว้างไอคอนเพื่อให้ข้อความอยู่ตรงกลางเป๊ะๆ */
    }

    .email-link {
      display: inline-flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 20px;
      padding: 16px 32px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255, 107, 107, 0.12) 0%, rgba(255, 179, 71, 0.12) 100%);
      backdrop-filter: blur(24px) saturate(200%);
      -webkit-backdrop-filter: blur(24px) saturate(200%);
      border: 1px solid rgba(255, 107, 107, 0.3);
      box-shadow: 0 8px 24px rgba(255, 107, 107, 0.08), inset 0 2px 8px rgba(255, 255, 255, 0.4);
      text-decoration: none;
      color: #1f2937;
      font-size: 1.05rem;
      font-weight: 600;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      width: fit-content;
    }

    .email-link i {
      font-size: 1.3rem;
      background: linear-gradient(135deg, #ff6b6b, #ffb347);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0;
    }

    .email-link:hover {
      background: linear-gradient(135deg, rgba(255, 107, 107, 0.25) 0%, rgba(255, 179, 71, 0.25) 100%);
      border-color: rgba(255, 107, 107, 0.5);
      box-shadow: 0 15px 40px rgba(255, 107, 107, 0.2), inset 0 2px 10px rgba(255, 255, 255, 0.6);
      transform: translateY(-4px) scale(1.02);
    }

    .theme-dark .email-link {
      background: linear-gradient(135deg, rgba(255, 107, 107, 0.1) 0%, rgba(255, 179, 71, 0.1) 100%);
      border: 1px solid rgba(255, 107, 107, 0.2);
      box-shadow: 0 10px 30px rgba(255, 107, 107, 0.1), inset 0 2px 10px rgba(255, 255, 255, 0.05);
      color: #fff;
    }

    .theme-dark .email-link:hover {
      background: linear-gradient(135deg, rgba(255, 107, 107, 0.15) 0%, rgba(255, 179, 71, 0.15) 100%);
      border-color: rgba(255, 107, 107, 0.3);
      box-shadow: 0 15px 40px rgba(255, 107, 107, 0.2), inset 0 2px 10px rgba(255, 255, 255, 0.1);
    }
