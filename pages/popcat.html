            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .modal-close-btn {

    <div class="modal" id="nameModal">
        <div class="modal-content">
            <button class="modal-close-btn" onclick="document.getElementById('nameModal').style.display = 'none';">
                <i class="fas fa-times"></i>
            </button>
            <h2>Welcome!</h2>
            <p style="color: #888; margin-bottom: 20px; font-size: 0.9rem;">กรอกชื่อเพื่อบันทึกคะแนนใน Leaderboard</p>
            <input type="text" id="playerName" class="name-input" maxlength="20" placeholder="พิมพ์ชื่อของคุณ...">
            <button class="game-button" style="width:100%; margin-bottom: 0;" onclick="submitScore()">
                <i class="fas fa-play"></i> เข้าสู่เกม
            </button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script src="/js/main.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAXfzmalfP4RZjMSjDbl5LOXBT7m9vzDzU", authDomain: "ppknr-popcat.firebaseapp.com", databaseURL: "https://ppknr-popcat-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "ppknr-popcat", storageBucket: "ppknr-popcat.firebasestorage.app", messagingSenderId: "90126143526", appId: "1:90126143526:web:96316212d303ac08df16e7" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const leaderboardRef = database.ref('leaderboard');
        const totalClicksRef = database.ref('totalClicks');

        let count = 0, pendingClicks = 0, clickTimeout = null;
        let currentPlayerName = localStorage.getItem('playerName') || '';
        let playerNodeKey = localStorage.getItem('playerNodeKey') || null;
        let allEntries = [], currentPage = 1, perPage = 10;

        const popSound = document.getElementById('popSound');
        const volumeSlider = document.getElementById('volumeSlider');
        if (popSound) popSound.volume = volumeSlider.value;
        volumeSlider.oninput = (e) => { if (popSound) popSound.volume = e.target.value; };

        const badges = [
            { threshold: 100, name: "🥉 นักคลิกหน้าใหม่", color: "#cd7f32" },
            { threshold: 1000, name: "🥈 มือไวไฟกรด", color: "#c0c0c0" },
            { threshold: 5000, name: "🥇 เทพเจ้าแห่งการคลิก", color: "#ffd700" },
            { threshold: 10000, name: "💎 ตำนานนักป๊อป", color: "#4CC9F0" }
        ];

        function checkBadges(score) {
            const badgeDiv = document.getElementById('achievementBadge');
            const unlocked = badges.filter(b => score >= b.threshold).pop();
            if (unlocked) {
                badgeDiv.innerHTML = `<i class="fas fa-medal"></i> ${unlocked.name}`;
                badgeDiv.style.color = unlocked.color;
            } else { badgeDiv.innerHTML = ""; }
        }

        function shareScore() {
            const text = currentPlayerName ? `ฉันทำคะแนนใน Pisit Pop ได้ ${count.toLocaleString()} คลิก! มาแข่งกัน!` : `มาเล่น Pisit Pop กันเถอะ!`;
            if (navigator.share) {
                navigator.share({ title: 'Pisit Pop', text: text, url: window.location.href });
            } else { 
                alert("เบราว์เซอร์ไม่รองรับการแชร์ ก๊อปปี้ลิงก์เว็บไปวางเพื่อชวนเพื่อนได้เลย!"); 
            }
        }

        function updateDisplayName() {
            if (currentPlayerName) {
                document.getElementById('playerNameDisplay').textContent = "ผู้เล่น: " + currentPlayerName;
            } else {
                document.getElementById('playerNameDisplay').textContent = "ใส่ชื่อ / เปลี่ยนชื่อ";
            }
        }

        $(function(){ 
            updateDisplayName();
        });

        totalClicksRef.on('value', (snap) => {
            const val = snap.val() || 0;
            document.getElementById('totalClicksDisplay').textContent = val.toLocaleString();
        });

        if (currentPlayerName) {
            leaderboardRef.orderByChild('name').equalTo(currentPlayerName).once('value', (snap) => {
                if (snap.exists()) {
                    snap.forEach((child) => {
                        count = child.val().score || 0;
                        document.getElementById('clickCount').textContent = count;
                        playerNodeKey = child.key;
                        checkBadges(count);
                    });
                }
            });
        }

        leaderboardRef.on('value', (snapshot) => {
            const temp = [];
            snapshot.forEach((child) => {
                temp.push({ 
                    name: child.val().name || 'Unknown', 
                    score: child.val().score || 0,
                    timestamp: child.val().timestamp || 0
                });
            });
            temp.sort((a, b) => (b.score - a.score) || (a.timestamp - b.timestamp));
            allEntries = temp.slice(0, 50);
            renderLeaderboard();
        });

        function renderLeaderboard() {
            const totalPages = Math.ceil(allEntries.length / perPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            
            const start = (currentPage - 1) * perPage;
            const pageData = allEntries.slice(start, start + perPage);
            
            document.getElementById('leaderboardEntries').innerHTML = pageData.map((e, i) => `
                <div class="leaderboard-entry">
                    <span class="rank">#${start + i + 1}</span>
                    <span class="player-name">${e.name}</span>
                    <span class="score">${(e.score || 0).toLocaleString()}</span>
                </div>
            `).join('');
            
            let pgHtml = '';
            if (totalPages > 1) {
                for(let i = 1; i <= totalPages; i++) {
                    pgHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="currentPage=${i}; renderLeaderboard()">${i}</button>`;
                }
            }
            document.getElementById('paginationContainer').innerHTML = pgHtml;
        }

        const handlePop = (e) => {
            if (e.target.closest('#changeNameBtn') || e.target.closest('.controls-overlay')) return;
            
            count++; pendingClicks++;
            document.getElementById('clickCount').textContent = count;
            checkBadges(count);
            
            if (popSound) {
                const soundClone = popSound.cloneNode();
                soundClone.volume = volumeSlider.value;
                soundClone.play().catch(e => {});
            }
            
            document.getElementById('catImageOpen').classList.add('active');
            document.getElementById('catImage').classList.add('pop-animation');
            setTimeout(() => document.getElementById('catImage').classList.remove('pop-animation'), 80);
            setTimeout(() => document.getElementById('catImageOpen').classList.remove('active'), 50);
            
            clearTimeout(clickTimeout);
            clickTimeout = setTimeout(() => {
                const save = pendingClicks; pendingClicks = 0;
                totalClicksRef.transaction(c => (c || 0) + save);
                if (playerNodeKey) {
                    leaderboardRef.child(playerNodeKey).update({ 
                        score: firebase.database.ServerValue.increment(save), 
                        timestamp: firebase.database.ServerValue.TIMESTAMP 
                    });
                }
            }, 500);
        };

        const clickArea = document.getElementById('clickArea');
        // รองรับ multi-touch รัวๆ และเมาส์ด้วย pointerdown
        clickArea.addEventListener('pointerdown', handlePop);
        
        // กันไม่ให้อุปกรณ์พยายามลากรูปภาพขณะกดรัวๆ
        document.getElementById('catImage').ondragstart = () => false;
        document.getElementById('catImageOpen').ondragstart = () => false;

        function submitScore() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) return;
            currentPlayerName = name; 
            localStorage.setItem('playerName', name);
            
            leaderboardRef.orderByChild('name').equalTo(name).once('value', (snap) => {
                if (snap.exists()) {
                    snap.forEach(c => { 
                        playerNodeKey = c.key; 
                        count = c.val().score || 0; 
                    });
                } else { 
                    const r = leaderboardRef.push(); 
                    playerNodeKey = r.key; 
                    r.set({ name: name, score: count, timestamp: firebase.database.ServerValue.TIMESTAMP }); 
                }
                localStorage.setItem('playerNodeKey', playerNodeKey);
                document.getElementById('clickCount').textContent = count;
                updateDisplayName();
                checkBadges(count);
            });
            document.getElementById('nameModal').style.display = 'none';
        }

        document.getElementById('changeNameBtn').onclick = () => {
            currentPlayerName = ''; 
            playerNodeKey = null;
            localStorage.removeItem('playerName'); 
            localStorage.removeItem('playerNodeKey');
            count = 0; 
            document.getElementById('clickCount').textContent = '0'; 
            updateDisplayName();
            checkBadges(0);
            document.getElementById('playerName').value = '';
            document.getElementById('nameModal').style.display = 'flex';
        };

        // เพิ่มคำสั่งให้กดปุ่ม Enter ในคีย์บอร์ดเพื่อยืนยันการตั้งชื่อได้เลย
        document.getElementById('playerName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitScore();
        });
    </script>
