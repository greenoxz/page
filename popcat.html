<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6552505597075020" crossorigin="anonymous"></script>
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fcfcfc" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#18181b" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pisit Pop</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        .game-container { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 20px; user-select: none; -webkit-user-select: none; position: relative; min-height: 100vh; width: 100%; box-sizing: border-box; margin-top: -60px; padding-top: 80px; cursor: pointer; }
        .page-container { display: flex; flex-direction: column; min-height: 100vh; position: relative; overflow-x: hidden; }
        .game-title { font-size: 3rem; color: #2c3e50; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); pointer-events: none; z-index: 2; }
        body.theme-dark .game-title { color: #fff; }
        
        #achievementBadge { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; min-height: 1.5rem; z-index: 2; pointer-events: none; }
        
        .stat-value { font-size: 2.5rem; font-weight: bold; color: #2c3e50; }
        body.theme-dark .stat-value { color: #fff; }
        .cat-container { position: relative; transition: transform 0.05s; margin-bottom: 20px; transform-origin: center; }
        .cat-container:active { transform: scale(0.85); }
        .cat-image { width: 300px; height: 300px; transition: transform 0.05s; pointer-events: none; }
        .mouth-open { position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 0.05s; }
        .mouth-open.active { opacity: 1; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(0.85); } 100% { transform: scale(1); } }
        .pop-animation { animation: pop 0.08s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .controls-overlay { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; align-items: flex-end; }
        .volume-overlay, .share-btn { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); padding: 10px 18px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; gap: 12px; }
        body.theme-dark .volume-overlay, body.theme-dark .share-btn { background: rgba(24, 24, 27, 0.9); border: 1px solid rgba(255,255,255,0.1); color: white; }
        .share-btn { cursor: pointer; border: none; font-family: inherit; font-weight: bold; color: #FF4D1C; transition: transform 0.2s; }
        .share-btn:hover { transform: scale(1.05); }
        .volume-slider { width: 100px; cursor: pointer; accent-color: #FF4D1C; }
        
        .game-button { padding: 12px 24px; font-size: 1rem; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background-color: #FF4D1C; color: white; margin-bottom: 20px; z-index: 10; transition: transform 0.1s; }
        .game-button:active { transform: scale(0.97); }
        
        .leaderboard { margin: 40px auto 60px auto; padding: 25px; border-radius: 15px; max-width: 600px; width: 90%; background-color: #f5f5f5; z-index: 2; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        body.theme-dark .leaderboard { background-color: #1a1a1c; border: 1px solid #333; }
        .leaderboard-header { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #ddd; }
        body.theme-dark .leaderboard-header { border-bottom-color: #333; }
        .leaderboard-title { color: #2c3e50; font-size: 24px; font-weight: 700; margin-bottom: 5px; }
        body.theme-dark .leaderboard-title { color: white; }
        
        .leaderboard-entry { display: flex; justify-content: space-between; padding: 15px 20px; margin: 10px 0; background: #fff; border-radius: 12px; border-left: 5px solid #FF4D1C; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .leaderboard-entry:hover { transform: translateX(5px); }
        body.theme-dark .leaderboard-entry { background: #222; color: #fff; border-left-color: #FF4D1C; }
        .rank { color: #FF4D1C; font-weight: bold; font-size: 1.1rem; width: 40px; }
        .player-name { flex-grow: 1; font-weight: 500; }
        .score { color: #FF4D1C; font-weight: bold; font-size: 1.1rem; }
        
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
        .page-btn { padding: 8px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-weight: bold; transition: all 0.2s; color: #333; }
        .page-btn:hover { background: #eee; }
        .page-btn.active { background: #FF4D1C; color: #fff; border-color: #FF4D1C; }
        body.theme-dark .page-btn { background: #222; border-color: #444; color: #fff; }
        body.theme-dark .page-btn:hover { background: #333; }
        body.theme-dark .page-btn.active { background: #FF4D1C; border-color: #FF4D1C; color: #fff; }
        
        /* Modal & Input Fixes */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: #ffffff; padding: 40px 30px; border-radius: 16px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); color: #333; }
        body.theme-dark .modal-content { background: #18181b; color: #ffffff; border: 1px solid #333; }
        
        .name-input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 20px; 
            border-radius: 10px; 
            border: 2px solid #ddd; 
            text-align: center; 
            font-size: 16px; 
            font-family: inherit; 
            background-color: #f9f9f9; 
            color: #333333; 
            transition: all 0.2s;
        }
        .name-input::placeholder { color: #aaa; }
        .name-input:focus { outline: none; border-color: #FF4D1C; background-color: #ffffff; }

        body.theme-dark .name-input { 
            background-color: #222222; 
            border-color: #444444; 
            color: #ffffff; 
        }
        body.theme-dark .name-input::placeholder { color: #888; }
        body.theme-dark .name-input:focus { border-color: #FF4D1C; background-color: #111111; }
    </style>
</head>
<body id="theme-body">
    <div class="page-container">
        <div id="nav-placeholder"></div>
        <div class="game-container" id="clickArea">
            <h1 class="game-title">Pisit Pop</h1>
            <div id="achievementBadge"></div>
            <button class="game-button" id="changeNameBtn"><i class="fas fa-user-edit"></i> <span id="playerNameDisplay">ใส่ชื่อ / เปลี่ยนชื่อ</span></button>
            <div class="stat-value" id="clickCount">0</div>
            <div class="cat-container">
                <img src="pic/pisit-closed.webp" alt="Cat" class="cat-image" id="catImage">
                <img src="pic/pisit-open.webp" alt="Cat Open" class="cat-image mouth-open" id="catImageOpen">
            </div>
        </div>

        <div class="controls-overlay">
            <button class="share-btn" onclick="shareScore()"><i class="fas fa-share-alt"></i> แชร์คะแนน</button>
            <div class="volume-overlay" id="volumeOverlay">
                <i class="fas fa-volume-up" style="color:#FF4D1C"></i>
                <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.5">
            </div>
        </div>

        <div class="leaderboard">
            <div class="leaderboard-header">
                <h2 class="leaderboard-title">Leaderboard (Top 50)</h2>
                <div style="color: #888; font-size: 1rem; margin-top: 5px;">
                    <i class="fas fa-globe"></i> Total Global Clicks: <span id="totalClicksDisplay" style="font-weight:bold; color:#FF4D1C;">0</span>
                </div>
            </div>
            <div id="leaderboardEntries"></div>
            <div id="paginationContainer" class="pagination"></div>
        </div>
        <audio id="popSound" src="sound/pop.mp3" preload="auto"></audio>
        <div id="footer-placeholder"></div>
    </div>

    <div class="modal" id="nameModal">
        <div class="modal-content">
            <h2>Welcome!</h2>
            <p style="color: #888; margin-bottom: 20px; font-size: 0.9rem;">กรอกชื่อเพื่อบันทึกคะแนนใน Leaderboard</p>
            <input type="text" id="playerName" class="name-input" maxlength="20" placeholder="พิมพ์ชื่อของคุณ...">
            <button class="game-button" style="width:100%; margin-bottom: 0;" onclick="submitScore()">
                <i class="fas fa-play"></i> เข้าสู่เกม
            </button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAXfzmalfP4RZjMSjDbl5LOXBT7m9vzDzU", authDomain: "ppknr-popcat.firebaseapp.com", databaseURL: "https://ppknr-popcat-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "ppknr-popcat", storageBucket: "ppknr-popcat.firebasestorage.app", messagingSenderId: "90126143526", appId: "1:90126143526:web:96316212d303ac08df16e7" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const leaderboardRef = database.ref('leaderboard');
        const totalClicksRef = database.ref('totalClicks');

        let count = 0, pendingClicks = 0, clickTimeout = null;
        let currentPlayerName = localStorage.getItem('playerName') || '';
        let playerNodeKey = localStorage.getItem('playerNodeKey') || null;
        let allEntries = [], currentPage = 1, perPage = 10;

        const popSound = document.getElementById('popSound');
        const volumeSlider = document.getElementById('volumeSlider');
        if (popSound) popSound.volume = volumeSlider.value;
        volumeSlider.oninput = (e) => { if (popSound) popSound.volume = e.target.value; };

        const badges = [
            { threshold: 100, name: "🥉 นักคลิกหน้าใหม่", color: "#cd7f32" },
            { threshold: 1000, name: "🥈 มือไวไฟกรด", color: "#c0c0c0" },
            { threshold: 5000, name: "🥇 เทพเจ้าแห่งการคลิก", color: "#ffd700" },
            { threshold: 10000, name: "💎 ตำนานนักป๊อป", color: "#4CC9F0" }
        ];

        function checkBadges(score) {
            const badgeDiv = document.getElementById('achievementBadge');
            const unlocked = badges.filter(b => score >= b.threshold).pop();
            if (unlocked) {
                badgeDiv.innerHTML = `<i class="fas fa-medal"></i> ${unlocked.name}`;
                badgeDiv.style.color = unlocked.color;
            } else { badgeDiv.innerHTML = ""; }
        }

        function shareScore() {
            const text = currentPlayerName ? `ฉันทำคะแนนใน Pisit Pop ได้ ${count.toLocaleString()} คลิก! มาแข่งกัน!` : `มาเล่น Pisit Pop กันเถอะ!`;
            if (navigator.share) {
                navigator.share({ title: 'Pisit Pop', text: text, url: window.location.href });
            } else { 
                alert("เบราว์เซอร์ไม่รองรับการแชร์ ก๊อปปี้ลิงก์เว็บไปวางเพื่อชวนเพื่อนได้เลย!"); 
            }
        }

        function updateDisplayName() {
            if (currentPlayerName) {
                document.getElementById('playerNameDisplay').textContent = "ผู้เล่น: " + currentPlayerName;
            } else {
                document.getElementById('playerNameDisplay').textContent = "ใส่ชื่อ / เปลี่ยนชื่อ";
            }
        }

        $(function(){ 
            $("#nav-placeholder").load("nav.html"); 
            $("#footer-placeholder").load("footer.html"); 
            updateDisplayName();
        });

        totalClicksRef.on('value', (snap) => {
            const val = snap.val() || 0;
            document.getElementById('totalClicksDisplay').textContent = val.toLocaleString();
        });

        if (currentPlayerName) {
            leaderboardRef.orderByChild('name').equalTo(currentPlayerName).once('value', (snap) => {
                if (snap.exists()) {
                    snap.forEach((child) => {
                        count = child.val().score || 0;
                        document.getElementById('clickCount').textContent = count;
                        playerNodeKey = child.key;
                        checkBadges(count);
                    });
                }
            });
        }

        leaderboardRef.on('value', (snapshot) => {
            const temp = [];
            snapshot.forEach((child) => {
                temp.push({ 
                    name: child.val().name || 'Unknown', 
                    score: child.val().score || 0,
                    timestamp: child.val().timestamp || 0
                });
            });
            temp.sort((a, b) => (b.score - a.score) || (a.timestamp - b.timestamp));
            allEntries = temp.slice(0, 50);
            renderLeaderboard();
        });

        function renderLeaderboard() {
            const totalPages = Math.ceil(allEntries.length / perPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            
            const start = (currentPage - 1) * perPage;
            const pageData = allEntries.slice(start, start + perPage);
            
            document.getElementById('leaderboardEntries').innerHTML = pageData.map((e, i) => `
                <div class="leaderboard-entry">
                    <span class="rank">#${start + i + 1}</span>
                    <span class="player-name">${e.name}</span>
                    <span class="score">${(e.score || 0).toLocaleString()}</span>
                </div>
            `).join('');
            
            let pgHtml = '';
            if (totalPages > 1) {
                for(let i = 1; i <= totalPages; i++) {
                    pgHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="currentPage=${i}; renderLeaderboard()">${i}</button>`;
                }
            }
            document.getElementById('paginationContainer').innerHTML = pgHtml;
        }

        document.getElementById('clickArea').onclick = (e) => {
            if (e.target.closest('#changeNameBtn') || e.target.closest('.controls-overlay')) return;
            
            count++; pendingClicks++;
            document.getElementById('clickCount').textContent = count;
            checkBadges(count);
            
            if (popSound) {
                popSound.currentTime = 0; 
                popSound.play();
            }
            
            document.getElementById('catImageOpen').classList.add('active');
            document.getElementById('catImage').classList.add('pop-animation');
            setTimeout(() => document.getElementById('catImage').classList.remove('pop-animation'), 80);
            setTimeout(() => document.getElementById('catImageOpen').classList.remove('active'), 50);
            
            clearTimeout(clickTimeout);
            clickTimeout = setTimeout(() => {
                const save = pendingClicks; pendingClicks = 0;
                totalClicksRef.transaction(c => (c || 0) + save);
                if (playerNodeKey) {
                    leaderboardRef.child(playerNodeKey).update({ 
                        score: firebase.database.ServerValue.increment(save), 
                        timestamp: firebase.database.ServerValue.TIMESTAMP 
                    });
                }
            }, 500);
        };

        function submitScore() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) return;
            currentPlayerName = name; 
            localStorage.setItem('playerName', name);
            
            leaderboardRef.orderByChild('name').equalTo(name).once('value', (snap) => {
                if (snap.exists()) {
                    snap.forEach(c => { 
                        playerNodeKey = c.key; 
                        count = c.val().score || 0; 
                    });
                } else { 
                    const r = leaderboardRef.push(); 
                    playerNodeKey = r.key; 
                    r.set({ name: name, score: count, timestamp: firebase.database.ServerValue.TIMESTAMP }); 
                }
                localStorage.setItem('playerNodeKey', playerNodeKey);
                document.getElementById('clickCount').textContent = count;
                updateDisplayName();
                checkBadges(count);
            });
            document.getElementById('nameModal').style.display = 'none';
        }

        document.getElementById('changeNameBtn').onclick = () => {
            currentPlayerName = ''; 
            playerNodeKey = null;
            localStorage.removeItem('playerName'); 
            localStorage.removeItem('playerNodeKey');
            count = 0; 
            document.getElementById('clickCount').textContent = '0'; 
            updateDisplayName();
            checkBadges(0);
            document.getElementById('playerName').value = '';
            document.getElementById('nameModal').style.display = 'flex';
        };

        // เพิ่มคำสั่งให้กดปุ่ม Enter ในคีย์บอร์ดเพื่อยืนยันการตั้งชื่อได้เลย
        document.getElementById('playerName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitScore();
        });
    </script>
</body>
</html>
