<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fcfcfc" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#18181b" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pisit Pop</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 20px;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            min-height: 100vh;
            width: 100%;
            box-sizing: border-box;
            margin-top: -60px;
            padding-top: 80px;
            cursor: pointer;
        }

        .page-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .game-title {
            font-size: 3rem;
            color: #2c3e50;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            pointer-events: none;
            z-index: 2;
        }

        body.theme-dark .game-title { color: #fff; }

        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px 30px;
            pointer-events: none;
            z-index: 2;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #2c3e50;
        }

        body.theme-dark .stat-value { color: #fff; }

        .cat-container {
            position: relative;
            transition: transform 0.05s;
            margin-bottom: 20px;
            transform-origin: center;
        }

        .cat-container:active { transform: scale(0.85); }

        .cat-image {
            width: 300px;
            height: 300px;
            transition: transform 0.05s;
            pointer-events: none;
        }

        .mouth-open {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.05s;
        }

        .mouth-open.active { opacity: 1; }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(0.85); }
            100% { transform: scale(1); }
        }

        .pop-animation { animation: pop 0.08s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* --- Volume Overlay (Bottom Right) --- */
        .volume-overlay {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            padding: 10px 18px;
            border-radius: 30px;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
            transition: opacity 0.3s;
        }

        body.theme-dark .volume-overlay {
            background: rgba(24, 24, 27, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .volume-slider {
            width: 120px;
            cursor: pointer;
            accent-color: #FF4D1C;
        }

        .volume-icon { color: #FF4D1C; font-size: 1.1rem; }

        /* --- Button Design --- */
        .game-button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-weight: bold;
            font-family: 'Anuphan', sans-serif;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
            background-color: #FF4D1C;
            z-index: 10;
            margin-bottom: 20px;
        }
        .game-button:hover { background-color: #e64519; }
        .game-button:active { transform: scale(0.97); }

        /* --- Leaderboard Design --- */
        .leaderboard {
            margin: 40px auto 60px auto;
            padding: 25px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            background-color: #f5f5f5;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            z-index: 2;
        }

        body.theme-dark .leaderboard {
            background-color: #1a1a1c;
            border: 1px solid #333;
        }

        .leaderboard-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ddd;
        }

        body.theme-dark .leaderboard-header { border-bottom-color: #333; }

        .leaderboard-title {
            color: #2c3e50;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        body.theme-dark .leaderboard-title { color: white; }

        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            margin: 10px 0;
            background-color: #fff;
            border-radius: 12px;
            border-left: 5px solid #FF4D1C;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
        }

        body.theme-dark .leaderboard-entry {
            background-color: #222;
            color: white;
        }

        .rank { font-weight: bold; font-size: 1.1rem; color: #FF4D1C; width: 40px; }
        .player-name { flex-grow: 1; font-weight: 500; }
        .score { font-weight: bold; color: #FF4D1C; font-size: 1.1rem; }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: #fff;
            color: #333;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .page-btn:hover { background: #eee; }
        .page-btn.active { background: #FF4D1C; color: #fff; border-color: #FF4D1C; }

        body.theme-dark .page-btn { background: #222; border-color: #444; color: #fff; }
        body.theme-dark .page-btn.active { background: #FF4D1C; border-color: #FF4D1C; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-content {
            background-color: #fff;
            padding: 40px 30px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        body.theme-dark .modal-content { background-color: #18181b; color: white; }
        .name-input {
            width: 100%; padding: 14px; margin-bottom: 20px;
            border: 2px solid #ddd; border-radius: 10px;
            box-sizing: border-box; text-align: center; font-size: 16px;
        }
        body.theme-dark .name-input { background: #222; color: #fff; border-color: #444; }
    </style>
</head>
<body id="theme-body">
    <div class="page-container">
        <div id="nav-placeholder"></div>

        <div class="game-container" id="clickArea">
            <h1 class="game-title">Pisit Pop</h1>
            
            <button class="game-button" id="changeNameBtn">
                <i class="fas fa-user-edit"></i>
                <span id="playerNameDisplay">ใส่ชื่อ / เปลี่ยนชื่อ</span>
            </button>

            <div class="stats-container">
                <div class="stat-box">
                    <div class="stat-value" id="clickCount">0</div>
                </div>
            </div>
            <div class="cat-container">
                <img src="pic/pisit-closed.webp" alt="Pop Cat" class="cat-image" id="catImage">
                <img src="pic/pisit-open.webp" alt="Pop Cat Open" class="cat-image mouth-open" id="catImageOpen">
            </div>
        </div>

        <div class="volume-overlay" id="volumeOverlay">
            <i class="fas fa-volume-up volume-icon"></i>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.5">
        </div>

        <div class="leaderboard">
            <div class="leaderboard-header">
                <h2 class="leaderboard-title">Leaderboard (Top 50)</h2>
                <div class="total-clicks" style="color: #666;">
                    Total Clicks: <span id="totalClicks" style="font-weight:bold; color:#FF4D1C;">0</span>
                </div>
            </div>
            <div id="leaderboardEntries"></div>
            <div id="paginationContainer" class="pagination"></div>
        </div>

        <audio id="popSound" src="sound/pop.mp3" preload="auto"></audio>
        <div id="footer-placeholder"></div>
    </div>

    <div class="modal" id="nameModal">
        <div class="modal-content">
            <h2 id="modalTitle">Welcome!</h2>
            <p id="modalDesc">กรอกชื่อเพื่อร่วมสนุกบน Leaderboard</p>
            <input type="text" id="playerName" class="name-input" maxlength="20" placeholder="พิมพ์ชื่อของคุณ...">
            <button class="game-button" style="width: 100%; margin-bottom: 0;" onclick="submitScore()">
                <i class="fas fa-play"></i> เข้าสู่เกม
            </button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAXfzmalfP4RZjMSjDbl5LOXBT7m9vzDzU",
            authDomain: "ppknr-popcat.firebaseapp.com",
            databaseURL: "https://ppknr-popcat-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ppknr-popcat",
            storageBucket: "ppknr-popcat.firebasestorage.app",
            messagingSenderId: "90126143526",
            appId: "1:90126143526:web:96316212d303ac08df16e7"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const totalClicksRef = database.ref('totalClicks');
        const leaderboardRef = database.ref('leaderboard');

        $(function(){
            $("#nav-placeholder").load("nav.html", function() {
                $('.desktop-menu a[href="popcat.html"]').addClass('active');
                $('.mobile-menu a[href="popcat.html"]').addClass('active');
            });
            $("#footer-placeholder").load("footer.html");
        });

        const clickArea = document.getElementById('clickArea');
        const catImage = document.getElementById('catImage');
        const catImageOpen = document.getElementById('catImageOpen');
        const clickCount = document.getElementById('clickCount');
        const totalClicks = document.getElementById('totalClicks');
        const popSound = document.getElementById('popSound');
        const volumeSlider = document.getElementById('volumeSlider');
        const playerNameDisplay = document.getElementById('playerNameDisplay');
        const changeNameBtn = document.getElementById('changeNameBtn');
        const nameModal = document.getElementById('nameModal');
        const playerNameInput = document.getElementById('playerName');
        const leaderboardEntries = document.getElementById('leaderboardEntries');
        const paginationContainer = document.getElementById('paginationContainer');

        let count = 0;
        let pendingClicks = 0;
        let clickTimeout = null;
        let currentPlayerName = localStorage.getItem('playerName') || '';
        let playerNodeKey = localStorage.getItem('playerNodeKey') || null;

        let allEntries = [];
        let currentPage = 1;
        const perPage = 10;

        // Volume Logic
        if (popSound) popSound.volume = volumeSlider.value;
        volumeSlider.addEventListener('input', (e) => {
            if (popSound) popSound.volume = e.target.value;
        });

        function updateDisplay() {
            playerNameDisplay.textContent = currentPlayerName ? 'ผู้เล่น: ' + currentPlayerName : 'ใส่ชื่อ / เปลี่ยนชื่อ';
        }
        updateDisplay();

        if (currentPlayerName) {
            leaderboardRef.orderByChild('name').equalTo(currentPlayerName).once('value', (snap) => {
                if (snap.exists()) {
                    snap.forEach((child) => {
                        count = child.val().score || 0;
                        clickCount.textContent = count;
                        playerNodeKey = child.key;
                        localStorage.setItem('playerNodeKey', playerNodeKey);
                    });
                }
            });
        }

        totalClicksRef.on('value', (snap) => { totalClicks.textContent = snap.val() || 0; });

        leaderboardRef.on('value', (snapshot) => {
            const tempEntries = [];
            snapshot.forEach((child) => {
                tempEntries.push({ name: child.val().name, score: child.val().score, timestamp: child.val().timestamp });
            });
            tempEntries.sort((a, b) => (b.score - a.score) || (a.timestamp - b.timestamp));
            allEntries = tempEntries.slice(0, 50);
            renderLeaderboard();
        });

        function renderLeaderboard() {
            const totalPages = Math.ceil(allEntries.length / perPage) || 1;
            const start = (currentPage - 1) * perPage;
            const pageData = allEntries.slice(start, start + perPage);

            leaderboardEntries.innerHTML = pageData.map((entry, i) => `
                <div class="leaderboard-entry">
                    <span class="rank">#${start + i + 1}</span>
                    <span class="player-name">${entry.name}</span>
                    <span class="score">${entry.score.toLocaleString()}</span>
                </div>
            `).join('');

            let pgHtml = '';
            for(let i=1; i<=totalPages; i++) {
                pgHtml += `<button class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</button>`;
            }
            paginationContainer.innerHTML = pgHtml;
        }

        window.changePage = (p) => { currentPage = p; renderLeaderboard(); };

        function submitScore() {
            const name = playerNameInput.value.trim();
            if (!name) return;
            currentPlayerName = name;
            localStorage.setItem('playerName', name);
            updateDisplay();

            leaderboardRef.orderByChild('name').equalTo(name).once('value', (snap) => {
                if (snap.exists()) {
                    snap.forEach((child) => {
                        playerNodeKey = child.key;
                        localStorage.setItem('playerNodeKey', playerNodeKey);
                        child.ref.update({ score: firebase.database.ServerValue.increment(count), timestamp: firebase.database.ServerValue.TIMESTAMP })
                        .then(() => child.ref.once('value').then(s => { count = s.val().score; clickCount.textContent = count; }));
                    });
                } else {
                    const newRef = leaderboardRef.push();
                    playerNodeKey = newRef.key;
                    localStorage.setItem('playerNodeKey', playerNodeKey);
                    newRef.set({ name: name, score: count, timestamp: firebase.database.ServerValue.TIMESTAMP });
                }
            });
            nameModal.style.display = 'none';
        }

        clickArea.addEventListener('click', (e) => {
            // ป้องกันการนับคลิกเมื่อปรับเสียงหรือเปลี่ยนชื่อ
            if (e.target.closest('#changeNameBtn') || e.target.closest('#volumeOverlay')) return;
            
            count++; pendingClicks++;
            clickCount.textContent = count;
            
            if (popSound) {
                popSound.currentTime = 0;
                popSound.play();
            }

            catImageOpen.classList.add('active');
            catImage.classList.add('pop-animation');
            setTimeout(() => catImage.classList.remove('pop-animation'), 80);
            setTimeout(() => catImageOpen.classList.remove('active'), 50);

            clearTimeout(clickTimeout);
            clickTimeout = setTimeout(() => {
                const save = pendingClicks; pendingClicks = 0;
                totalClicksRef.transaction(c => (c || 0) + save);
                if (currentPlayerName && playerNodeKey) {
                    leaderboardRef.child(playerNodeKey).update({ 
                        score: firebase.database.ServerValue.increment(save), 
                        timestamp: firebase.database.ServerValue.TIMESTAMP 
                    });
                }
            }, 500);
        });

        changeNameBtn.onclick = () => {
            currentPlayerName = ''; playerNodeKey = null;
            localStorage.removeItem('playerName'); localStorage.removeItem('playerNodeKey');
            count = 0; clickCount.textContent = '0'; updateDisplay();
            document.getElementById('modalTitle').textContent = "Welcome back!";
            nameModal.style.display = 'flex';
        };

        playerNameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') submitScore(); });
    </script>
</body>
</html>
